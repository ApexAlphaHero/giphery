# Giphery — SWAG subdomain reverse-proxy config.
# Copy to: /mnt/user/appdata/swag/nginx/proxy-confs/giphery.subdomain.conf
# Then restart the SWAG container.
#
# Requires: a DNS record for giphery.<yourdomain> (or a wildcard) and that SWAG
# is joined to the "giphery" docker network so it can resolve giphery-api.

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name giphery.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 20m;   # must exceed MAX_UPLOAD_BYTES (16 MiB)

    # Extra hardening headers (the API also sets these itself).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        include /config/nginx/proxy.conf;          # sets X-Forwarded-For etc.
        resolver 127.0.0.11 valid=30s;             # docker DNS

        set $upstream_app giphery-api;             # container name
        set $upstream_port 8000;
        set $upstream_proto http;                  # TLS terminates here at SWAG
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }
}
