name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  server:
    name: Server (lint · type-check · test · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type-check
        run: mypy app
      - name: Test
        run: coverage run -m pytest && coverage report
      - name: Dependency vulnerability scan
        run: pip-audit

  android:
    name: Android (build · test · lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"        # AGP 8.13 runs on JDK 17–21
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Install required SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
      - uses: gradle/actions/setup-gradle@v4
      # Hard gates: the app must compile, tests must pass, an APK must assemble.
      - name: Unit tests
        run: ./gradlew testDebugUnitTest
      - name: Assemble debug APK
        run: ./gradlew assembleDebug
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: giphery-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
      # Style checks are advisory for now (not yet formatted to ktlint/detekt
      # rules). Flip continue-on-error to false once the code is auto-formatted.
      - name: Lint (ktlint + detekt)
        continue-on-error: true
        run: ./gradlew ktlintCheck detekt
