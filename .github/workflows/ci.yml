name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  server:
    name: Server (lint · type-check · test · audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type-check
        run: mypy app
      - name: Test
        run: coverage run -m pytest && coverage report
      - name: Dependency vulnerability scan
        run: pip-audit

  android:
    name: Android (lint · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4
      - name: Lint (ktlint + detekt)
        run: ./gradlew ktlintCheck detekt
      - name: Unit tests
        run: ./gradlew testDebugUnitTest
      - name: Dependency vulnerability check
        run: ./gradlew dependencyCheckAnalyze || true  # configure suppressions before enforcing
